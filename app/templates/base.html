<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Expense Analysis{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body>
    <nav class="container">
      <ul>
        <li><strong>Expense Analysis</strong></li>
      </ul>
      {% if current_user.is_authenticated %}
        <ul>
          <li>{{ current_user.email }}</li>
          <li><a href="{{ url_for('main.parser') }}">Parser</a></li>
          <li>
            <form action="{{ url_for('auth.logout') }}" method="post" style="margin:0">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
              <button type="submit" class="secondary outline">Sign out</button>
            </form>
          </li>
        </ul>
      {% endif %}
    </nav>

    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <article class="flash flash-{{ category }}">{{ message }}</article>
        {% endfor %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
